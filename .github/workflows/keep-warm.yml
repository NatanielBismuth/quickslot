name: keep-warm

# Keeps the free Render web service awake by pinging /api/ping every 5 minutes.
# GitHub THROTTLES `schedule` triggers on low-traffic repos (measured ~80-min gaps),
# which let the service sleep. So we run ONE long-lived job that loops curl every
# 5 min, then re-dispatches itself for the next cycle. `schedule` is kept ONLY as a
# backstop to restart the chain if a self-handoff is ever missed.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

permissions:
  actions: write

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Ping /api/ping every 5 min (~5.4h)
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -u
          if [ -z "${APP_URL:-}" ]; then
            echo "::error::APP_URL repo variable is not set."; exit 1
          fi
          BASE="${APP_URL%/}"
          END=$(( SECONDS + 19500 ))
          while [ "$SECONDS" -lt "$END" ]; do
            CODE=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 60 --retry 2 --retry-delay 5 "$BASE/api/ping" || echo "ERR")
            echo "$(date -u +%H:%M:%SZ) ping $BASE/api/ping -> $CODE"
            sleep 300
          done
      - name: Hand off to next cycle
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run keep-warm.yml --ref master
