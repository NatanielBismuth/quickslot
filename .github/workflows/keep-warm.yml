name: keep-warm

# Pings the live app on a schedule so Render's FREE web service (which spins down
# after ~15 min idle) stays awake, avoiding the 30-40s cold start. The target is
# GET /api/ping, which runs a trivial `SELECT 1` so it ALSO keeps Neon Postgres
# from autosuspending.
#
# ⚠ RELIABILITY: GitHub Actions cron is best-effort. Scheduled runs are routinely
# delayed 10+ minutes under load, and GitHub auto-DISABLES scheduled workflows
# after 60 days of repo inactivity. Treat this as a BACKUP only — the primary
# keep-warm should be a dedicated uptime pinger (UptimeRobot / cron-job.org).
# See README → "Keeping the app warm (cold-start fix)".

on:
  schedule:
    # Every 10 minutes (Render spins down at ~15 min idle, so this leaves margin).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Don't pile up overlapping pings if a run is slow.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/ping
        env:
          # REQUIRED: set this repo variable to your live Render URL (no trailing slash):
          #   Settings → Secrets and variables → Actions → Variables → New → APP_URL
          #   e.g. https://quickslot.onrender.com
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL repo variable is not set. Add it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          echo "Pinging ${APP_URL}/api/ping"
          # --max-time covers the worst case where THIS ping is the cold-start one.
          curl -fsS --max-time 60 --retry 2 --retry-delay 10 "${APP_URL%/}/api/ping"
